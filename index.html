    function normalizeExportCell(value) {
      if (value === null || value === undefined) return "";
      return String(value).replace(/"/g, '""');
    }

    function exportCurrentTabToExcel(tabKey) {
      const cfg = viewConfigs[tabKey];
      if (!cfg) return;
      const fields = getExportFieldOrder(tabKey);
      if (!fields.length) {
        alert("Chức năng này chưa hỗ trợ xuất Excel.");
        return;
      }
      const lines = [];
      lines.push(cfg.columns.map((col) => `"${normalizeExportCell(col)}"`).join(","));
      cfg.rows.forEach((row) => {
        const values = fields.map((field) => `"${normalizeExportCell(row[field])}"`);
        lines.push(values.join(","));
      });
      const csvContent = "\uFEFF" + lines.join("\n");
      const blob = new Blob([csvContent], { type: "text/csv;charset=utf-8;" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = `${tabKey}-${new Date().toISOString().slice(0, 10)}.csv`;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
    }

    function exportCurrentTabToPdf(tabKey) {
      const cfg = viewConfigs[tabKey];
      if (!cfg) return;
      const fields = getExportFieldOrder(tabKey);
      if (!fields.length) {
        alert("Chức năng này chưa hỗ trợ xuất PDF.");
        return;
      }
      const headerHtml = cfg.columns.map((col) => `<th>${col}</th>`).join("");
      const bodyHtml = cfg.rows
        .map((row) => {
          const tds = fields.map((field) => `<td>${row[field] ?? ""}</td>`).join("");
          return `<tr>${tds}</tr>`;
        })
        .join("");
      const popup = window.open("", "_blank", "width=1200,height=800");
      if (!popup) {
        alert("Trình duyệt đang chặn cửa sổ in PDF. Vui lòng cho phép popup và thử lại.");
        return;
      }
      popup.document.write(`
        <html>
          <head>
            <meta charset="UTF-8">
            <title>${cfg.title}</title>
            <style>
              body { font-family: Arial, sans-serif; padding: 16px; }
              h2 { margin: 0 0 10px; font-size: 18px; }
              table { width: 100%; border-collapse: collapse; font-size: 12px; }
              th, td { border: 1px solid #d3dbe5; padding: 6px; text-align: left; }
              th { background: #eef4fb; }
            </style>
          </head>
          <body>
            <h2>${cfg.title}</h2>
            <table>
              <thead><tr>${headerHtml}</tr></thead>
              <tbody>${bodyHtml}</tbody>
            </table>
          </body>
        </html>
      `);
      popup.document.close();
      popup.focus();
      popup.print();
    }

    function escAttr(s) {
      return String(s ?? "")
        .replace(/&/g, "&amp;")
        .replace(/"/g, "&quot;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;");
    }

    function getRowListLines(row, cfg) {
      const dm = cfg.detailMap;
      if (!row || !dm || !dm.length) {
        return { primary: "—", sub: "" };
      }
      const k0 = dm[0][1];
      const primary = row[k0] !== undefined && row[k0] !== null ? String(row[k0]) : "—";
      let sub = "";
      if (dm.length > 1) {
        const v1 = row[dm[1][1]];
        sub = v1 !== undefined && v1 !== null ? String(v1) : "—";
      }
      if (dm.length > 2) {
        const v2 = row[dm[2][1]];
        const s2 = v2 !== undefined && v2 !== null ? String(v2) : "—";
        sub = sub ? `${sub} · ${s2}` : s2;
      }
      return { primary, sub };
    }

      if (!isFieldEditable) {
        if (key === "status" || key === "result" || key === "receiveStatus") {

        const v = row[key];

                <span>Đơn vị: ${cfg.reportMeta.unit}</span>

      const report46MetaHtml = activeTab === "report46" || activeTab === "report108"

              <div style="font-size:26px;font-weight:800;text-align:center;line-height:1.25;margin-bottom:10px;">

          </div>

      const report105FilterHtml = activeTab === "report105"

          <div class="detail" style="margin-bottom:10px;">
            <div class="detail-body" style="display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap;">

                <select id="report105DateFilter" class="cell-select" style="min-width:180px;">

                  ${Array.from(new Set(cfg.rows.map((row) => row.date)))

                    .join("")}

              </div>
              <div class="toolbar">
                <button id="btnApplyReport105Filter" type="button">Xem thông tin</button>

                <button id="btnExportPdf" type="button">Xuất PDF</button>
              </div>
            </div>
          </div>
        `
        : "";
      const report106FilterHtml = activeTab === "report106"
        ? `
          <div class="detail" style="margin-bottom:10px;">
            <div class="detail-body" style="display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap;">
              <div style="display:flex;align-items:center;gap:8px;">
                <label for="report106WeekFilter"><b>Chọn tuần:</b></label>
                <select id="report106WeekFilter" class="cell-select" style="min-width:240px;">
                  <option value="">Tất cả</option>
                  ${Array.from(new Set(cfg.rows.map((row) => row.week)))
                    .map((week) => `<option value="${week}" ${reportFilterByTab.report106 === week ? "selected" : ""}>${week}</option>`)
                    .join("")}
                </select>
              </div>
              <div class="toolbar">
                <button id="btnApplyReport106Filter" type="button">Xem thông tin</button>
                <button id="btnClearReport106Filter" type="button">Bỏ lọc</button>
                <button id="btnExportExcel" type="button">Xuất Excel</button>
                <button id="btnExportPdf" type="button">Xuất PDF</button>
              </div>
            </div>
          </div>
        `
        : "";
      const report107FilterHtml = activeTab === "report107"
        ? `
          <div class="detail" style="margin-bottom:10px;">
            <div class="detail-body" style="display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap;">
              <div style="display:flex;align-items:center;gap:8px;">
                <label for="report107MonthFilter"><b>Chọn tháng:</b></label>
                <select id="report107MonthFilter" class="cell-select" style="min-width:220px;">
                  <option value="">Tất cả</option>
                  ${Array.from(new Set(cfg.rows.map((row) => row.month)))
                    .map((month) => `<option value="${month}" ${reportFilterByTab.report107 === month ? "selected" : ""}>${month}</option>`)
                    .join("")}
                </select>
              </div>
              <div class="toolbar">
                <button id="btnApplyReport107Filter" type="button">Xem thông tin</button>
                <button id="btnClearReport107Filter" type="button">Bỏ lọc</button>
                <button id="btnExportExcel" type="button">Xuất Excel</button>
                <button id="btnExportPdf" type="button">Xuất PDF</button>
              </div>
            </div>
          </div>
        `
        : "";
      const report108FilterHtml = activeTab === "report108"
        ? `
          <div class="detail" style="margin-bottom:10px;">
            <div class="detail-body" style="display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap;">
              <div style="display:flex;align-items:center;gap:8px;">
                <label for="report108QuarterFilter"><b>Chọn quý:</b></label>
                <select id="report108QuarterFilter" class="cell-select" style="min-width:220px;">
                  <option value="">Tất cả</option>
                  ${Array.from(new Set(cfg.rows.map((row) => row.quarter)))
                    .map((quarter) => `<option value="${quarter}" ${reportFilterByTab.report108 === quarter ? "selected" : ""}>${quarter}</option>`)
                    .join("")}
                </select>
              </div>
              <div class="toolbar">
                <button id="btnApplyReport108Filter" type="button">Xem thông tin</button>
                <button id="btnClearReport108Filter" type="button">Bỏ lọc</button>
                <button id="btnExportExcel" type="button">Xuất Excel</button>
                <button id="btnExportPdf" type="button">Xuất PDF</button>
              </div>
            </div>
          </div>
        `
        : "";
      const canExport =
        activeTab === "task126" ||
        activeTab === "task127" ||
        activeTab === "task128" ||
        activeTab === "task129" ||
        activeTab === "task130" ||
        activeTab === "task131" ||
        activeTab === "task132" ||
        activeTab === "report103" ||
        activeTab === "report104" ||
        activeTab === "report105" ||
        activeTab === "report106" ||
        activeTab === "report107" ||
        activeTab === "report108" ||
        activeTab === "report109" ||
        activeTab === "report110";

      const showCrud =
        activeTab !== "report43" &&
        activeTab !== "report44" &&
        activeTab !== "report45" &&
        activeTab !== "report46" &&
        activeTab !== "report105" &&
        activeTab !== "report106" &&
        activeTab !== "report107" &&
        activeTab !== "report108";

      const listSection = (() => {
        if (!filteredRows.length) {
          return `<div class="task126-list-wrap"><div class="empty" style="padding:20px;">Không có dữ liệu.</div></div>`;
        }
        const items = filteredRows
          .map((row, idx) => {
            const active = idx === rowIdx ? " active" : "";
            const { primary, sub } = getRowListLines(row, cfg);
            return `<li class="task126-selectable${active}" data-index="${idx}" role="button" tabindex="0">
                  <div class="task126-li-main">
                    <span class="task126-code">${primary}</span>
                    <span class="task126-chev" aria-hidden="true">›</span>
                  </div>
                  ${sub ? `<div class="task126-li-sub">${sub}</div>` : ""}
                </li>`;
          })
          .join("");
        return `<div class="task126-list-wrap"><ul class="task126-device-list">${items}</ul></div>`;
      })();

      const rowOverlaySection = `
        <div class="task126-detail-overlay" id="rowDetOverlay" ${detailPanelOpen ? "" : "hidden"} aria-hidden="${detailPanelOpen ? "false" : "true"}">
          <button type="button" class="task126-detail-scrim" id="rowDetScrim" aria-label="Đóng chi tiết"></button>
          <div class="task126-detail-panel" id="rowDetPanel" role="dialog" aria-modal="true" aria-labelledby="rowDetTitle" tabindex="-1">
            <div class="task126-detail-header">
              <h2 class="task126-detail-title" id="rowDetTitle">${isRowLineEditing && selected ? "Sửa thông tin" : "Chi tiết"}${selected ? ` — ${listTitlePrimary}` : ""}</h2>
              <button type="button" class="task126-detail-close" id="rowDetClose" aria-label="Đóng">×</button>
            </div>
            <div class="task126-detail-body" id="rowDetBody">
              <div class="task126-detail-kv-inner detail-body">${listDetailInner}</div>
              ${activeTab === "task139" && selected && detailPanelOpen ? approvalHtml : ""}
            </div>
          </div>
        </div>`;

      container.innerHTML = `
        <div class="panel-head">
          <b>${cfg.title}</b>
          <div class="panel-head-right">
            ${showCrud
              ? `<small>Nhấn dòng trên danh sách để xem chi tiết (gần toàn màn hình)</small>
                 <div class="toolbar">
                   <button id="btnAddRow" type="button">Thêm</button>
                   <button id="btnEditRow" type="button">Sửa</button>
                   <button id="btnSaveRow" type="button" class="primary">Lưu lại</button>
                   <button id="btnDeleteRow" type="button">Xóa</button>
                   ${(canExport && activeTab !== "report105" && activeTab !== "report106" && activeTab !== "report107" && activeTab !== "report108") ? `<button id="btnExportExcel" type="button">Xuất Excel</button><button id="btnExportPdf" type="button">Xuất PDF</button>` : ""}
                 </div>`
              : ""
            }
          </div>
        </div>
        <div class="panel-body panel-body--task126">
          ${report43MetaHtml}
          ${report44MetaHtml}
          ${report45MetaHtml}
          ${report46MetaHtml}
          ${report105FilterHtml}
          ${report106FilterHtml}
          ${report107FilterHtml}
          ${report108FilterHtml}
          ${listSection}
        </div>
        ${rowOverlaySection}
      `;

      container.className = "panel panel--task126";
      const ws = document.querySelector(".workspace");
      if (ws) {
        ws.classList.add("workspace--task126");
        ws.classList.toggle("task126-noscroll", detailPanelOpen);
      }

      container.querySelectorAll(".task126-selectable").forEach((li) => {
        li.addEventListener("click", () => {
          if (editingRowByTab[activeTab] !== undefined) return;
          selectedRowByTab[activeTab] = Number(li.dataset.index);
          detailPanelOpen = true;
          renderPanel();
        });
        li.addEventListener("keydown", (e) => {
          if (e.key === "Enter" || e.key === " ") {
            e.preventDefault();
            li.click();
          }
        });
      });
      const closeRowDetail = () => {
        detailPanelOpen = false;
        if (editingRowByTab[activeTab] !== undefined) {
          delete editingRowByTab[activeTab];
        }
        renderPanel();
      };
      const scrim = container.querySelector("#rowDetScrim");
      const btnClose = container.querySelector("#rowDetClose");
      if (scrim) scrim.addEventListener("click", closeRowDetail);
      if (btnClose) btnClose.addEventListener("click", closeRowDetail);
      if (detailPanelOpen) {
        const rowPanel = container.querySelector("#rowDetPanel");
        if (rowPanel) rowPanel.focus();
      }

      container.querySelectorAll(".cell-input, .cell-select").forEach((el) => {
        el.addEventListener("click", (e) => e.stopPropagation());
        el.addEventListener("mousedown", (e) => e.stopPropagation());
      });

      const btnAddRow = container.querySelector("#btnAddRow");
      const btnEditRow = container.querySelector("#btnEditRow");
      const btnSaveRow = container.querySelector("#btnSaveRow");
      const btnDeleteRow = container.querySelector("#btnDeleteRow");
      const btnExportExcel = container.querySelector("#btnExportExcel");
      const btnExportPdf = container.querySelector("#btnExportPdf");
      const btnApplyReport105Filter = container.querySelector("#btnApplyReport105Filter");
      const btnClearReport105Filter = container.querySelector("#btnClearReport105Filter");
      const report105DateFilter = container.querySelector("#report105DateFilter");
      const btnApplyReport106Filter = container.querySelector("#btnApplyReport106Filter");
      const btnClearReport106Filter = container.querySelector("#btnClearReport106Filter");
      const report106WeekFilter = container.querySelector("#report106WeekFilter");
      const btnApplyReport107Filter = container.querySelector("#btnApplyReport107Filter");
      const btnClearReport107Filter = container.querySelector("#btnClearReport107Filter");
      const report107MonthFilter = container.querySelector("#report107MonthFilter");
      const btnApplyReport108Filter = container.querySelector("#btnApplyReport108Filter");
      const btnClearReport108Filter = container.querySelector("#btnClearReport108Filter");
      const report108QuarterFilter = container.querySelector("#report108QuarterFilter");
      if (canExport) {
        if (btnExportExcel) {
          btnExportExcel.addEventListener("click", () => {
            exportCurrentTabToExcel(activeTab);
          });
        }
        if (btnExportPdf) {
          btnExportPdf.addEventListener("click", () => {
            exportCurrentTabToPdf(activeTab);
          });
        }
      }
      if (activeTab === "report105") {
        if (btnApplyReport105Filter && report105DateFilter) {
          btnApplyReport105Filter.addEventListener("click", () => {
            reportFilterByTab.report105 = report105DateFilter.value || "";
            selectedRowByTab.report105 = 0;
            renderPanel();
          });
        }
        if (btnClearReport105Filter) {
          btnClearReport105Filter.addEventListener("click", () => {
            reportFilterByTab.report105 = "";
            selectedRowByTab.report105 = 0;
            renderPanel();
          });
        }
      }
      if (activeTab === "report106") {
        if (btnApplyReport106Filter && report106WeekFilter) {
          btnApplyReport106Filter.addEventListener("click", () => {
            reportFilterByTab.report106 = report106WeekFilter.value || "";
            selectedRowByTab.report106 = 0;
            renderPanel();
          });
        }
        if (btnClearReport106Filter) {
          btnClearReport106Filter.addEventListener("click", () => {
            reportFilterByTab.report106 = "";
            selectedRowByTab.report106 = 0;
            renderPanel();
          });
        }
      }
      if (activeTab === "report107") {
        if (btnApplyReport107Filter && report107MonthFilter) {
          btnApplyReport107Filter.addEventListener("click", () => {
            reportFilterByTab.report107 = report107MonthFilter.value || "";
            selectedRowByTab.report107 = 0;
            renderPanel();
          });
        }
        if (btnClearReport107Filter) {
          btnClearReport107Filter.addEventListener("click", () => {
            reportFilterByTab.report107 = "";
            selectedRowByTab.report107 = 0;
            renderPanel();
          });
        }
      }
      if (activeTab === "report108") {
        if (btnApplyReport108Filter && report108QuarterFilter) {
          btnApplyReport108Filter.addEventListener("click", () => {
            reportFilterByTab.report108 = report108QuarterFilter.value || "";
            selectedRowByTab.report108 = 0;
            renderPanel();
          });
        }
        if (btnClearReport108Filter) {
          btnClearReport108Filter.addEventListener("click", () => {
            reportFilterByTab.report108 = "";
            selectedRowByTab.report108 = 0;
            renderPanel();
          });
        }
      }
      if (!showCrud) return;

      btnAddRow.addEventListener("click", () => {
        const newRow = createDefaultRow(activeTab);
        cfg.rows.push(newRow);
        if (activeTab === "task138") syncApprovalFromRegistration(newRow);
        selectedRowByTab[activeTab] = cfg.rows.length - 1;
        editingRowByTab[activeTab] = cfg.rows.length - 1;
        detailPanelOpen = true;
        renderPanel();
      });

      btnEditRow.addEventListener("click", () => {
        if (!selected) {
          alert("Vui lòng chọn 1 dòng để sửa.");
          return;
        }
        detailPanelOpen = true;
        editingRowByTab[activeTab] = rowIdx;
        renderPanel();
      });

      btnSaveRow.addEventListener("click", () => {
        const editIdx = editingRowByTab[activeTab];
        if (editIdx === undefined) {
          alert("Chưa ở chế độ sửa.");
          return;
        }
        const targetRow = cfg.rows[editIdx];
        if (!targetRow) return;
        const editRowEl =
          container.querySelector("#rowDetBody");
        if (!editRowEl) {
          alert("Không tìm thấy vùng chỉnh sửa.");
          return;
        }
        editableFields.forEach((field) => {
          const input = editRowEl.querySelector(`[data-field="${field}"]`);
          if (!input) return;
          targetRow[field] = input.value;
        });
        if (targetRow.amount !== undefined) targetRow.amount = Number(targetRow.amount || 0);
        if (targetRow.completedCount !== undefined) targetRow.completedCount = Number(targetRow.completedCount || 0);
        if (targetRow.inProgressCount !== undefined) targetRow.inProgressCount = Number(targetRow.inProgressCount || 0);
        if (targetRow.notCollectedCount !== undefined) targetRow.notCollectedCount = Number(targetRow.notCollectedCount || 0);
        if (targetRow.dataSizeMb !== undefined) targetRow.dataSizeMb = Number(targetRow.dataSizeMb || 0);
        if (targetRow.value !== undefined) targetRow.value = Number(targetRow.value || 0);
        if (activeTab === "task138") syncApprovalFromRegistration(targetRow);
        delete editingRowByTab[activeTab];
        renderPanel();
      });

      btnDeleteRow.addEventListener("click", () => {
        if (!selected) {
          alert("Vui lòng chọn 1 dòng để xóa.");
          return;
        }
        if (!confirm("Xác nhận xóa bản ghi đang chọn?")) return;
        if (activeTab === "task138") removeApprovalByRegistrationId(selected.id);
        if (activeTab === "task139") removeRegistrationByApprovalId(selected.id);
        cfg.rows.splice(rowIdx, 1);
        if (
          activeTab === "report41" ||
          activeTab === "report42" ||
          activeTab === "report103" ||
          activeTab === "report104" ||
          activeTab === "report109" ||
          activeTab === "report110"
        ) {
          cfg.rows.forEach((row, index) => {
            row.stt = index + 1;
          });
        }
        selectedRowByTab[activeTab] = 0;
        delete editingRowByTab[activeTab];
        renderPanel();
      });

      if (activeTab === "task139" && selected) {
        const btnApprove = container.querySelector("#btnApprove");
        const btnReject = container.querySelector("#btnReject");
        btnApprove.addEventListener("click", () => {
          const reason = container.querySelector("#approveReason").value.trim();
          const officer = container.querySelector("#approveOfficer").value.trim();
          if (!reason || !officer) {
            alert("Vui lòng nhập đủ lý do và người duyệt/từ chối.");
            return;
          }
          selected.result = "Đã duyệt";
          selected.status = "Đã duyệt";
          selected.reason = reason;
          selected.officer = officer;
          selected.updated = new Date().toLocaleString("vi-VN");
          syncRegistrationFromApproval(selected);
          refreshOverviewMetrics();
          renderPanel();
        });

        btnReject.addEventListener("click", () => {
          const reason = container.querySelector("#approveReason").value.trim();
          const officer = container.querySelector("#approveOfficer").value.trim();
          if (!reason || !officer) {
            alert("Vui lòng nhập đủ lý do và người duyệt/từ chối.");
            return;
          }
          selected.result = "Từ chối";
          selected.status = "Từ chối";
          selected.reason = reason;
          selected.officer = officer;
          selected.updated = new Date().toLocaleString("vi-VN");
          syncRegistrationFromApproval(selected);
          refreshOverviewMetrics();
          renderPanel();
        });
      }
    }

    function syncMenuState() {
      document.querySelectorAll(".menu-item").forEach((item) => {
        item.classList.toggle("active", item.dataset.view === activeTab);
      });
    }

    function openTab(key) {
      if (!viewConfigs[key]) return;
      if (!openTabs.includes(key)) openTabs.push(key);
      if (selectedRowByTab[key] === undefined) selectedRowByTab[key] = 0;
      activeTab = key;
      syncMenuState();
      renderTabs();
      renderPanel();
    }

    function closeTab(key) {
      const idx = openTabs.indexOf(key);
      if (idx >= 0) openTabs.splice(idx, 1);
      if (activeTab === key) {
        activeTab = openTabs.length ? openTabs[openTabs.length - 1] : null;
      }
      syncMenuState();
      renderTabs();
      renderPanel();
    }

    document.querySelectorAll(".menu-item").forEach((btn) => {
      btn.addEventListener("click", () => openTab(btn.dataset.view));
    });

    function updateClock() {
      const t = new Date().toLocaleString("vi-VN");
      const el = document.getElementById("clock");
      const elD = document.getElementById("clockDesktop");
      if (el) el.textContent = t;
      if (elD) elD.textContent = t;
    }
    setInterval(updateClock, 1000);
    updateClock();

    document.addEventListener("keydown", (e) => {
      if (e.key !== "Escape" || !detailPanelOpen) return;
      detailPanelOpen = false;
      if (editingRowByTab[activeTab] !== undefined) {
        delete editingRowByTab[activeTab];
      }
      renderPanel();
    });

    (function initMobileMenu() {
      const sidebar = document.getElementById("appSidebar");
      const backdrop = document.getElementById("sidebarBackdrop");
      const menuBtn = document.getElementById("appMenuBtn");
      if (!sidebar || !backdrop || !menuBtn) return;

      if (window.matchMedia("(min-width: 768px)").matches) {
        sidebar.setAttribute("aria-hidden", "false");
      }

      function openMenu() {
        if (window.innerWidth >= 768) return;
        sidebar.setAttribute("aria-hidden", "false");
        backdrop.hidden = false;
        backdrop.classList.add("is-open");
        menuBtn.setAttribute("aria-expanded", "true");
        document.body.classList.add("app-no-scroll");
      }

      function closeMenu() {
        if (window.innerWidth >= 768) {
          sidebar.setAttribute("aria-hidden", "false");
          backdrop.classList.remove("is-open");
          backdrop.hidden = true;
          document.body.classList.remove("app-no-scroll");
          menuBtn.setAttribute("aria-expanded", "false");
          return;
        }
        sidebar.setAttribute("aria-hidden", "true");
        backdrop.classList.remove("is-open");
        menuBtn.setAttribute("aria-expanded", "false");
        setTimeout(function () { backdrop.hidden = true; }, 200);
        document.body.classList.remove("app-no-scroll");
      }

      function toggleMenu() {
        if (sidebar.getAttribute("aria-hidden") === "true") openMenu();
        else closeMenu();
      }

      menuBtn.addEventListener("click", toggleMenu);
      backdrop.addEventListener("click", closeMenu);

      document.addEventListener("keydown", function (e) {
        if (e.key === "Escape" && sidebar.getAttribute("aria-hidden") === "false" && window.innerWidth < 768) {
          closeMenu();
        }
      });

      window.addEventListener("resize", function () {
        if (window.innerWidth >= 768) {
          closeMenu();
        } else {
          sidebar.setAttribute("aria-hidden", "true");
          backdrop.classList.remove("is-open");
          backdrop.hidden = true;
          document.body.classList.remove("app-no-scroll");
          menuBtn.setAttribute("aria-expanded", "false");
        }
      });

      document.querySelectorAll(".menu-item").forEach(function (btn) {
        btn.addEventListener("click", function () {
          if (window.innerWidth < 768) closeMenu();
        });
      });
    })();

    openTab("task137");
  </script>
